<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<header>
    <h1 class="header-text">TaskMan</h1>
</header>


<div id="displaying">
    <h2>課題一覧</h2>
    <ul id="task-list">
    </ul>
    <div>
        <button id="add-button" type="button">課題を追加</button>
    </div>
</div>

<div id="add-task-display">
    <div id="add-task-text">
        <p class="assignment-p">|課題名</p>
        <p class="deadline-p">|締め切り</p>
        <p class="importance-p">|優先度</p>
    </div>
    <form id="add-task-form">
        <input type="text" id="title" placeholder="タイトル">
        <input type="date" id="deadline" placeholder="締め切り">

        <select id="importance">
            <option value="3">高</option>
            <option value="2">中</option>
            <option value="1">低</option>
        </select>
        <button type="submit" id="add-task-button">追加</button>
    </form>
</div>

<div id="edit-task-display">
    <div id="edit-task-text">
        <p class="assignment-p">|課題名</p>
        <p class="deadline-p">|締め切り</p>
        <p class="importance-p">|優先度</p>
    </div>
        
     <form id="edit-task-form">
        <input type="text" id="edit-title" placeholder="タイトル">
        <input type="date" id="edit-deadline" placeholder="締め切り">

        <select id="edit-importance">
            <option value="3">高</option>
            <option value="2">中</option>
            <option value="1">低</option>
        </select>
        <button type="submit" id="edit-task-button">編集</button>
        <button type="button" id="edit-cancel-button">キャンセル</button>
        <button type="button" id="delete-task-button">削除</button>
    </form>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
